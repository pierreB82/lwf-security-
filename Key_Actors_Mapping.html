<!DOCTYPE html>
<!--
  Key Actors Mapping - LWF World Service
  Auteur : Pierre Beaurenaut, Security Advisor, Fédération Luthérienne Mondiale (FLM / LWF)
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="author" content="Pierre Beaurenaut - Fédération Luthérienne Mondiale (FLM/LWF)">
<title>Key Actors Mapping - LWF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fff;--bg2:#f4f6f0;--bg3:#eaede4;
  --border:#d4dcc4;--border2:#bfcbaa;
  --text:#1a1f26;--text2:#4a5568;--text3:#8a95a3;
  --accent:#8FAF2E;--accent2:#6a8420;--accent-lt:#edf3e0;
  --danger:#c0392b;--danger-bg:#fdf0ee;--danger-bd:#e8a99f;
  --ok:#1a6b3a;--ok-bg:#e8f5ed;--ok-bd:#a8d5b5;
  --moderate:#92660a;--moderate-bg:#fefce8;--moderate-bd:#d4b84a;
  --r:6px;--r2:4px;--font:'Source Sans 3',sans-serif;
  --shadow2:0 2px 8px rgba(80,110,30,.12);
  --sidebar-w:230px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:16px;line-height:1.5;display:flex;flex-direction:column;min-height:100vh;}
.topbar{position:sticky;top:0;z-index:100;background:var(--accent);border-bottom:1px solid var(--accent2);padding:0 16px;display:flex;align-items:center;gap:10px;min-height:50px;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.15);flex-wrap:wrap;}
.topbar img{height:40px;width:auto;flex-shrink:0;}
.topbar-logo{font-weight:700;font-size:14px;color:#fff;white-space:nowrap;}
.topbar-ver{font-size:11px;font-weight:400;opacity:.7;margin-left:6px;}
.topbar-sep{flex:1;}
.topbar-office{font-size:12px;color:rgba(255,255,255,.85);font-style:italic;max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.conf-badge{background:rgba(192,57,43,.85);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;white-space:nowrap;letter-spacing:.5px;flex-shrink:0;}
.lang-switcher{display:flex;gap:4px;}
.lang-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;cursor:pointer;font-size:15px;padding:4px 7px;border-radius:3px;min-height:40px;transition:background .15s;}
.lang-btn:hover,.lang-btn.active{background:rgba(255,255,255,.35);border-color:rgba(255,255,255,.6);}
.btn-topbar{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.35);color:#fff;font-family:var(--font);font-size:12px;font-weight:500;padding:8px 12px;border-radius:var(--r2);cursor:pointer;min-height:40px;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .15s;position:relative;}
.btn-topbar:hover{background:rgba(255,255,255,.28);}
.btn-topbar.reset:hover{background:rgba(255,80,60,.35);}
#saveIndicator{font-size:11px;color:rgba(255,255,255,.7);white-space:nowrap;display:none;}
.export-badge{display:none;position:absolute;top:-5px;right:-5px;background:var(--danger);color:#fff;border-radius:50%;width:16px;height:16px;font-size:10px;font-weight:700;align-items:center;justify-content:center;}
.page-layout{display:flex;align-items:flex-start;flex:1;}
.sidebar{width:var(--sidebar-w);flex-shrink:0;padding:18px 16px;position:sticky;top:50px;max-height:calc(100vh - 50px);overflow-y:auto;border-right:1px solid var(--border);background:var(--bg2);}
.sidebar-eyebrow{font-size:10px;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.sidebar-eyebrow::after{content:"";flex:1;height:1px;background:var(--border2);}
.main-area{flex:1;min-width:0;padding:20px 22px;}
.panel-eyebrow{font-size:10px;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.panel-title{font-size:20px;font-weight:700;color:var(--text);}
.panel-subtitle{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5;max-width:700px;}
.conf-banner{background:var(--danger-bg);border:1px solid var(--danger-bd);border-radius:var(--r2);padding:8px 14px;font-size:12px;color:var(--danger);font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.form-group{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;}
.form-label .req{color:var(--danger);}
.form-input,.form-textarea,.form-select{background:#f7faf3;border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:14px;padding:8px 10px;border-radius:8px;outline:none;width:100%;min-height:40px;transition:border-color .15s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--accent);}
.form-textarea{min-height:70px;resize:vertical;}
.form-input::placeholder,.form-textarea::placeholder{font-style:italic;color:var(--text3);opacity:1;}
.sidebar .form-input,.sidebar .form-select{background:var(--bg);font-size:12px;padding:7px 9px;min-height:36px;}
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-top:16px;}
.section:first-child{margin-top:0;}
.section-head{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.section-head h2{font-size:14px;font-weight:700;color:var(--text);}
.section-tabs{display:flex;gap:6px;margin-left:auto;}
.tabs{display:flex;gap:8px;margin-top:18px;}
.tab-btn{font-family:var(--font);font-size:15px;font-weight:700;padding:11px 22px;cursor:pointer;border-radius:var(--r) var(--r) 0 0;border:1.5px solid var(--border2);border-bottom:none;background:var(--bg3);color:var(--text3);transition:all .15s;min-height:48px;display:flex;align-items:center;gap:8px;}
.tab-btn .tab-icon{font-size:18px;}
.tab-btn:hover{background:var(--bg2);color:var(--text2);}
.tab-btn.active{background:var(--bg);color:var(--accent2);border-color:var(--accent);border-bottom:1.5px solid var(--bg);margin-bottom:-1.5px;z-index:1;}
.tab-content{border:1.5px solid var(--border2);border-radius:0 var(--r) var(--r) var(--r);background:var(--bg);padding:16px;}
.btn-primary{background:var(--accent);color:#fff;border:1px solid var(--accent2);font-family:var(--font);font-size:13px;font-weight:600;padding:8px 16px;border-radius:var(--r2);cursor:pointer;min-height:40px;display:inline-flex;align-items:center;gap:6px;transition:background .15s;}
.btn-primary:hover{background:var(--accent2);}
.btn-secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border2);font-family:var(--font);font-size:13px;font-weight:500;padding:8px 16px;border-radius:var(--r2);cursor:pointer;min-height:40px;display:inline-flex;align-items:center;gap:6px;transition:background .15s;}
.btn-secondary:hover{background:var(--bg3);}
.btn-icon{background:none;border:1px solid var(--border2);color:var(--text2);font-size:13px;padding:5px 9px;border-radius:var(--r2);cursor:pointer;min-height:40px;min-width:40px;transition:background .15s;}
.btn-icon:hover{background:var(--bg3);}
.btn-icon.delete-pending{background:var(--danger-bg);border-color:var(--danger);color:var(--danger);font-weight:700;}
.help-q{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;font-size:11px;font-weight:700;cursor:pointer;border:none;flex-shrink:0;}
.aide-box{background:var(--accent-lt);border:1px solid var(--border);border-radius:var(--r2);padding:8px 12px;display:flex;gap:8px;align-items:flex-start;margin-bottom:12px;}
.aide-icon{font-size:14px;flex-shrink:0;margin-top:1px;}
.aide-text{font-size:12px;color:var(--text2);line-height:1.5;}
.eng-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.eng-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid;}
.eng-pill.develop{background:var(--ok-bg);color:var(--ok);border-color:var(--ok-bd);}
.eng-pill.maintain{background:#eff6ff;color:#1d4ed8;border-color:#93c5fd;}
.eng-pill.monitor{background:var(--moderate-bg);color:var(--moderate);border-color:var(--moderate-bd);}
.eng-pill.avoid{background:#fff4ed;color:#c05c0a;border-color:#fdba74;}
.eng-pill.nocontact{background:var(--danger-bg);color:var(--danger);border-color:var(--danger-bd);}
.actors-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap;}
.actors-count{font-size:12px;color:var(--text3);}
.actor-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;overflow:hidden;}
.actor-card-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;}
.actor-card-header:hover{background:var(--bg2);}
.actor-cat-icon{font-size:16px;flex-shrink:0;}
.actor-num{font-size:11px;font-weight:600;color:var(--text3);min-width:20px;flex-shrink:0;}
.actor-name{font-size:14px;font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.actor-actions{display:flex;gap:5px;flex-shrink:0;}
.actor-card-body{border-top:1px solid var(--border);padding:14px;display:none;}
.actor-card-body.open{display:block;}
.actor-card-header .chevron{margin-left:auto;font-size:13px;color:var(--text3);transition:transform .2s;flex-shrink:0;padding-right:4px;}
.actor-card.expanded .chevron{transform:rotate(180deg);color:var(--accent2);}
.stale-flag{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:600;color:#b45309;background:#fef3c7;border:1px solid #f59e0b;border-radius:3px;padding:1px 5px;white-space:nowrap;cursor:help;flex-shrink:0;}
.critical-flag{font-size:13px;cursor:help;flex-shrink:0;}
.incoherence-flag{font-size:12px;cursor:help;color:#b45309;flex-shrink:0;}
.actor-inactive .actor-name{text-decoration:line-through;opacity:.5;}
.actor-inactive .actor-card-header{background:var(--bg3) !important;}
.trend-up{color:#16a34a;font-weight:700;font-size:14px;}
.trend-down{color:var(--danger);font-weight:700;font-size:14px;}
.trend-stable{color:var(--text3);font-weight:700;font-size:14px;}
.status-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;color:var(--text3);background:var(--bg3);border:1px solid var(--border2);border-radius:3px;padding:1px 6px;white-space:nowrap;margin-left:2px;}
.actors-limit-warn{background:#fef3c7;border:1px solid #f59e0b;border-radius:var(--r2);padding:8px 12px;font-size:12px;color:#92400e;font-weight:600;margin-bottom:10px;display:none;}
.actor-details-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;}
.actor-details-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.detail-box{background:var(--bg2);border-radius:var(--r2);padding:9px 11px;}
.detail-label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.detail-text{font-size:14px;color:var(--text);white-space:pre-wrap;line-height:1.5;}
.detail-text.is-example{font-style:italic;color:var(--text2);}
.rating-badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;margin-left:4px;}
.rating-high{background:var(--ok-bg);color:var(--ok);}
.rating-medium{background:var(--moderate-bg);color:var(--moderate);}
.rating-low{background:var(--danger-bg);color:var(--danger);}
.rating-fluctuant,.rating-unknown{background:#f0f0f0;color:#555;}
.example-tag{font-size:10px;font-weight:700;font-style:italic;color:var(--text3);background:var(--bg3);padding:1px 6px;border-radius:10px;margin-left:6px;border:1px solid var(--border2);}
.edit-panel{background:var(--bg);border:2px solid var(--accent);border-radius:var(--r);padding:16px;margin-bottom:14px;display:none;}
.edit-panel.open{display:block;}
.edit-panel-title{font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:14px;}
.form-row{display:grid;gap:10px;margin-bottom:12px;}
.form-row.cols-2{grid-template-columns:1fr 1fr;}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr;}
.matrix-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.matrix-legend-box{background:var(--accent-lt);border:1px solid var(--border);border-radius:var(--r2);padding:8px 12px;font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.5;}
.matrix-legend-box strong{color:var(--text);}
.matrix-svg{width:100%;max-width:700px;display:block;margin:0 auto;}
.matrix-note{font-size:11px;color:var(--text3);text-align:center;margin-top:6px;font-style:italic;}
.empty-state{text-align:center;padding:30px 20px;color:var(--text3);}
.review-alert{background:var(--danger-bg);border:1px solid var(--danger-bd);border-radius:var(--r2);padding:7px 10px;font-size:12px;color:var(--danger);margin-top:6px;display:none;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.overlay.hidden{display:none;}
.modal-box{background:var(--bg);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.22);width:100%;overflow:hidden;max-height:90vh;display:flex;flex-direction:column;}
.modal-header{background:var(--accent);color:#fff;padding:14px 20px;font-size:15px;font-weight:700;flex-shrink:0;}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;}
.export-option{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r2);cursor:pointer;margin-bottom:8px;transition:background .15s;}
.export-option:hover{background:var(--bg2);}
.export-opt-icon{font-size:22px;flex-shrink:0;}
.export-opt-label{font-size:13px;font-weight:600;}
.export-opt-desc{font-size:11px;color:var(--text3);}
.export-warn{background:#fffbee;border:1px solid #d4b84a;border-radius:var(--r2);padding:10px 14px;font-size:12px;color:#7a5c00;margin-bottom:14px;}
#fieldHelpPopover{position:fixed;z-index:300;background:var(--bg);border:1.5px solid var(--accent);border-radius:var(--r);padding:12px 14px;max-width:340px;font-size:13px;box-shadow:var(--shadow2);display:none;}
#fieldPopoverTitle{font-weight:700;font-size:13px;color:var(--accent2);margin-bottom:6px;}
#fieldPopoverText{color:var(--text2);line-height:1.5;}
.emergency-bar{position:fixed;bottom:0;left:0;right:0;background:var(--danger);color:#fff;padding:10px 20px;display:none;align-items:center;justify-content:space-between;gap:14px;z-index:500;}
.emergency-bar.show{display:flex;}
#otherCatWrap{display:none;margin-top:6px;}
.filter-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:12px;}
.filter-lbl{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;}
.filter-select{background:var(--bg);border:1px solid var(--border2);color:var(--text);font-family:var(--font);font-size:13px;padding:5px 8px;border-radius:var(--r2);min-height:32px;cursor:pointer;transition:border-color .15s;}
.filter-select:focus{outline:none;border-color:var(--accent);}
.filter-select.active{border-color:var(--accent);background:var(--accent-lt);color:var(--accent2);font-weight:600;}
.filter-clear-btn{background:var(--danger-bg);border:1px solid var(--danger-bd);color:var(--danger);font-size:12px;padding:4px 10px;border-radius:var(--r2);cursor:pointer;min-height:32px;transition:background .15s;}
.filter-clear-btn:hover{background:var(--danger);color:#fff;}
.matrix-actor-legend-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;margin-top:14px;}
.matrix-actor-legend-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:5px;}
.matrix-actor-item{display:flex;align-items:center;gap:7px;padding:5px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);font-size:13px;}
.matrix-actor-num{width:22px;height:22px;border-radius:50%;color:#fff;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.matrix-actor-name{font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
@media(max-width:768px){
  .page-layout{flex-direction:column;}
  .sidebar{width:100%;position:static;max-height:none;border-right:none;border-bottom:1px solid var(--border);}
  .form-row.cols-2,.form-row.cols-3{grid-template-columns:1fr;}
  .actor-details-grid{grid-template-columns:1fr;}
  .actor-details-grid-2{grid-template-columns:1fr;}
  .topbar-office{display:none;}
}
@media print{
  .topbar,.overlay,.emergency-bar,.edit-panel,.actor-actions,#fieldHelpPopover{display:none !important;}
  .actor-card-body{display:block !important;}
  body,.page-layout{display:block;}
  .sidebar{display:none;}
  .main-area{padding:0;}
}
</style>
</head>

let actors = [];
let editingIndex = -1;
let modCount = 0;
let currentTab = 'list';
let isInit = true;
let _deletePending = -1, _deleteTimer = null;

const CAT_ICONS = {gov:'&#127963;',mil:'&#129686;',nsag:'&#9876;',intl:'&#127758;',ngo:'&#129309;',com:'&#128101;',media:'&#128226;',priv:'&#128188;',other:'&#10067;','':'&#10067;'};
const ENG_COLORS = {develop:'#1a6b3a',maintain:'#1d4ed8',monitor:'#92660a',avoid:'#c05c0a',nocontact:'#c0392b'};
const RATING_POS = {high:0.78,medium:0.5,low:0.22};
const ACPT_ORDER = {low:1,medium:2,high:3,fluctuant:4,unknown:5};

function t(k){return(I18N[lang]&&I18N[lang][k])||I18N.en[k]||k;}

function setActiveFlag(l){
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.getAttribute('onclick').includes("'"+l+"'")));
}

function setLang(l){
  if(!I18N[l])return;
  const wasExamples = isDefaultExamples(actors);
  lang=l;
  try{localStorage.setItem(LS_LANG,l);}catch(e){}
  setActiveFlag(l);
  document.documentElement.lang=l;
  applyI18n();
  if(wasExamples){
    actors=JSON.parse(JSON.stringify(EXAMPLE_ACTORS[l]||EXAMPLE_ACTORS.en));
  }
  renderActors();
  if(currentTab==='matrix')renderMatrix();
}

function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    const v=I18N[lang]&&I18N[lang][k]!=null?I18N[lang][k]:I18N.en[k];
    if(v!=null)el.innerHTML=v;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{
    const k=el.getAttribute('data-i18n-placeholder');
    const v=t(k);if(v)el.placeholder=v;
  });
  document.querySelectorAll('select option[data-i18n]').forEach(opt=>{
    const k=opt.getAttribute('data-i18n');
    const v=t(k);if(v)opt.textContent=v;
  });
  // version
  const vEl=document.getElementById('topbarVersion');if(vEl)vEl.textContent=TOOL_VERSION;
  // intl help note
  const note=document.getElementById('intlHelpNote');
  if(note)note.innerHTML=t('help_intl_text');
}

function showFieldHelp(ev,tk,txtk){
  ev.stopPropagation();
  const pop=document.getElementById('fieldHelpPopover');
  document.getElementById('fieldPopoverTitle').textContent=t(tk);
  document.getElementById('fieldPopoverText').innerHTML=t(txtk);
  pop.style.display='block';
  const r=ev.target.getBoundingClientRect();
  let top=r.bottom+8,left=r.left;
  if(left+340>window.innerWidth)left=window.innerWidth-350;
  pop.style.top=top+'px';pop.style.left=Math.max(10,left)+'px';
}
document.addEventListener('click',e=>{
  const pop=document.getElementById('fieldHelpPopover');
  if(pop&&!pop.contains(e.target)&&!e.target.classList.contains('help-q'))pop.style.display='none';
});

function catIcon(c){return CAT_ICONS[c]||'&#10067;';}
function engClass(e){return e||'monitor';}
function ratingClass(r){return r==='high'?'rating-high':r==='medium'?'rating-medium':r==='low'?'rating-low':r==='unknown'?'rating-unknown':'rating-fluctuant';}
function ratingLabel(r){return t('rating_'+r)||r;}
function engLabel(e){return t('eng_'+e)||e;}
function catLabel(a){return a.category==='other'?(a.category_other||t('cat_other')):t('cat_'+a.category)||a.category;}

function isDefaultExamples(arr){
  if(!arr||arr.length===0)return false;
  const allNames=['en','fr','es'].flatMap(l=>EXAMPLE_ACTORS[l].map(a=>a.name));
  return arr.every(a=>allNames.includes(a.name));
}

function getFilteredActors(){
  const fi=document.getElementById('filterInfluence')?.value||'';
  const fa=document.getElementById('filterAcceptance')?.value||'';
  const fe=document.getElementById('filterEngagement')?.value||'';
  const hasFilter=fi||fa||fe;
  const clearBtn=document.getElementById('filterClearBtn');
  if(clearBtn)clearBtn.style.display=hasFilter?'inline-flex':'none';
  ['filterInfluence','filterAcceptance','filterEngagement'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.classList.toggle('active',!!el.value);
  });
  if(!hasFilter)return actors;
  return actors.filter(a=>(!fi||a.influence===fi)&&(!fa||a.acceptance===fa)&&(!fe||a.engagement===fe));
}
function applyFilters(){renderActors();}
function clearFilters(){
  ['filterInfluence','filterAcceptance','filterEngagement'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.value='';
  });
  renderActors();
}

function renderActors(){
  resetDeletePending();
  const list=document.getElementById('actorsList');
  const countEl=document.getElementById('actorsCount');
  if(!list)return;
  const sortBy=document.getElementById('sortBy')?.value||'acceptance';
  const INF_ORDER={high:1,medium:2,low:3,fluctuant:4,unknown:5};
  const ENG_ORDER={develop:1,maintain:2,monitor:3,avoid:4,nocontact:5};
  const filtered=getFilteredActors().slice().sort((a,b)=>{
    if(sortBy==='influence')return (INF_ORDER[a.influence]||9)-(INF_ORDER[b.influence]||9);
    if(sortBy==='engagement')return (ENG_ORDER[a.engagement]||9)-(ENG_ORDER[b.engagement]||9);
    if(sortBy==='date'){const da=a.last_updated||'';const db=b.last_updated||'';return da<db?1:da>db?-1:0;}
    if(sortBy==='name')return (a.name||'').localeCompare(b.name||'');
    return (ACPT_ORDER[a.acceptance]||9)-(ACPT_ORDER[b.acceptance]||9);
  });
  const total=actors.length;
  const shown=filtered.length;
  const activeCount=actors.filter(a=>!a.status||a.status==='active').length;
  const limitWarn=document.getElementById('actorsLimitWarn');
  if(limitWarn){if(activeCount>20){limitWarn.style.display='block';limitWarn.textContent=t('actors_limit_warning').replace('{n}',activeCount);}else{limitWarn.style.display='none';}}
  if(countEl){
    if(total===0)countEl.textContent=t('actors_count_zero');
    else if(shown<total)countEl.textContent=t('filter_results').replace('{shown}',shown).replace('{total}',total);
    else if(total===1)countEl.textContent=t('actors_count_one');
    else countEl.textContent=t('actors_count_n').replace('{n}',total);
  }
  if(total===0){
    list.innerHTML='<div class="empty-state"><div style="font-size:32px;margin-bottom:8px">&#128205;</div><p><strong>'+t('empty_title')+'</strong></p><p style="margin-top:6px;font-size:12px">'+t('empty_sub')+'</p></div>';
    return;
  }
  if(shown===0){
    list.innerHTML='<div class="empty-state"><div style="font-size:24px;margin-bottom:8px">&#128269;</div><p>'+t('filter_no_results')+'</p></div>';
    return;
  }
  list.innerHTML=filtered.map(a=>{const i=actors.indexOf(a);
    const exTag=a.is_example?'<span class="example-tag">'+t('example_badge')+'</span>':'';
    const isInactive=a.status&&a.status!=='active';
    const statusBadge=isInactive?`<span class="status-badge">${t('status_badge_'+a.status)||a.status}</span>`:'';
    const trendMap={up:'<span class="trend-up">&#8593;</span>',stable:'<span class="trend-stable">&#8594;</span>',down:'<span class="trend-down">&#8595;</span>'};
    const trendIcon=trendMap[a.trend||'']||'';
    const daysSince=a.last_updated?Math.floor((Date.now()-new Date(a.last_updated).getTime())/86400000):null;
    const staleFlag=daysSince!==null&&daysSince>90?`<span class="stale-flag" title="${t('stale_flag_tooltip')}">&#9679; ${t('stale_flag_text')}</span>`:'';
    const critFlag=(a.influence==='high'&&a.acceptance==='low')?`<span class="critical-flag" title="${t('critical_flag_tooltip')}">&#128308;</span>`:'';
    const incoherFlag=(a.engagement==='develop'&&a.acceptance==='low')?`<span class="incoherence-flag" title="${t('inconsistency_tip')}">&#9888;</span>`:'';
    return `<div class="actor-card${isInactive?' actor-inactive':''}" id="actor-card-${i}">
      <div class="actor-card-header" onclick="toggleCard(${i})">
        <span class="actor-num">${i+1}</span>
        <span class="actor-cat-icon">${catIcon(a.category)}</span>
        <span class="actor-name">${esc(a.name)}</span>${exTag}${statusBadge}
        <span style="font-size:11px;color:var(--text3);white-space:nowrap;margin-left:4px">${esc(catLabel(a))}</span>
        <span class="eng-pill ${engClass(a.engagement)}" style="font-size:10px;padding:2px 7px;margin-left:4px">${engLabel(a.engagement)}</span>
        <span class="rating-badge ${ratingClass(a.influence)}" style="font-size:11px" title="${t('lbl_influence')}"><small style="opacity:.5;font-size:9px;letter-spacing:.3px;text-transform:uppercase">${t('abbr_influence')} </small>${ratingLabel(a.influence)}</span>
        <span class="rating-badge ${ratingClass(a.acceptance)}" style="font-size:11px" title="${t('lbl_acceptance')}"><small style="opacity:.5;font-size:9px;letter-spacing:.3px;text-transform:uppercase">${t('abbr_acceptance')} </small>${ratingLabel(a.acceptance)}</span>
        ${trendIcon}${critFlag}${incoherFlag}${staleFlag}
        <span class="chevron">&#9660;</span>
        <div class="actor-actions" onclick="event.stopPropagation()">
          <button class="btn-icon" onclick="editActor(${i})" title="${t('btn_edit')}">&#9998;</button>
          <button class="btn-icon del-btn" style="color:var(--danger)" onclick="deleteActor(${i})" title="${t('btn_delete')}">&#128465;</button>
        </div>
      </div>
      <div class="actor-card-body" id="actor-body-${i}">
        <div class="actor-details-grid">
          <div class="detail-box"><div class="detail-label">${t('detail_interests')}</div><div class="detail-text${a.is_example?' is-example':''}">${esc(a.interests||'-')}</div></div>
          <div class="detail-box"><div class="detail-label">${t('detail_why')}</div><div class="detail-text${a.is_example?' is-example':''}">${esc(a.acceptance_why||'-')}</div></div>
          <div class="detail-box"><div class="detail-label">${t('detail_area')}</div><div class="detail-text${a.is_example?' is-example':''}">${esc(a.area||'-')}</div></div>
        </div>
        <div class="actor-details-grid-2" style="margin-top:8px">
          <div class="detail-box"><div class="detail-label">${t('detail_rel')}</div><div class="detail-text${a.is_example?' is-example':''}">${esc(a.relationships||'-')}</div></div>
          <div class="detail-box"><div class="detail-label">${t('detail_contact')}</div><div class="detail-text">${[a.contact_name,a.phone,a.email,a.last_meeting?t('lbl_last_meeting')+': '+a.last_meeting:'',a.frequency].filter(Boolean).map(v=>esc(v)).join('\n')||' - '}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toggleCard(i){const b=document.getElementById('actor-body-'+i);const c=document.getElementById('actor-card-'+i);if(b){b.classList.toggle('open');if(c)c.classList.toggle('expanded',b.classList.contains('open'));}}

function openAddActor(){
  editingIndex=-1;
  ['e_name','e_interests','e_acceptance_why','e_area','e_relationships','e_contact_name','e_phone','e_email','e_frequency','e_category_other'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['e_category','e_influence','e_acceptance','e_engagement'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const lm=document.getElementById('e_last_meeting');if(lm)lm.value='';
  setSel('e_status','active');setSel('e_trend','unknown');
  document.getElementById('otherCatWrap').style.display='none';
  document.getElementById('intlHelpNote').style.display='none';
  const p=document.getElementById('editPanel'),title=document.getElementById('editPanelTitle');
  if(title)title.innerHTML=t('edit_new_title');
  p.classList.add('open');p.scrollIntoView({behavior:'smooth',block:'start'});
}

function editActor(i){
  editingIndex=i;const a=actors[i];
  setVal('e_name',a.name);setSel('e_category',a.category);setSel('e_influence',a.influence);
  setSel('e_acceptance',a.acceptance);setSel('e_engagement',a.engagement);
  setSel('e_status',a.status||'active');setSel('e_trend',a.trend||'unknown');
  setVal('e_interests',a.interests);setVal('e_acceptance_why',a.acceptance_why);
  setVal('e_area',a.area);setVal('e_relationships',a.relationships);
  setVal('e_contact_name',a.contact_name);setVal('e_phone',a.phone);setVal('e_email',a.email);
  setVal('e_last_meeting',a.last_meeting);setVal('e_frequency',a.frequency);
  setVal('e_category_other',a.category_other||'');
  document.getElementById('otherCatWrap').style.display=a.category==='other'?'block':'none';
  document.getElementById('intlHelpNote').style.display=a.category==='intl'?'block':'none';
  const p=document.getElementById('editPanel'),title=document.getElementById('editPanelTitle');
  if(title)title.innerHTML=t('edit_title')+': '+esc(a.name);
  p.classList.add('open');p.scrollIntoView({behavior:'smooth',block:'start'});
}

function cancelEdit(){document.getElementById('editPanel').classList.remove('open');editingIndex=-1;}

function saveActor(){
  const name=(getVal('e_name')||'').trim();
  const category=getVal('e_category'),influence=getVal('e_influence'),acceptance=getVal('e_acceptance'),engagement=getVal('e_engagement');
  if(!name){alert(t('alert_name_required'));return;}
  if(!category){alert(t('alert_category_required'));return;}
  if(category==='other'&&!getVal('e_category_other').trim()){alert(t('alert_category_other_required'));return;}
  if(!influence){alert(t('alert_influence_required'));return;}
  if(!acceptance){alert(t('alert_acceptance_required'));return;}
  if(!engagement){alert(t('alert_engagement_required'));return;}
  const actor={name,category,category_other:getVal('e_category_other'),influence,acceptance,engagement,
    status:getVal('e_status')||'active',trend:getVal('e_trend')||'unknown',
    last_updated:new Date().toISOString().split('T')[0],
    interests:getVal('e_interests'),acceptance_why:getVal('e_acceptance_why'),
    area:getVal('e_area'),relationships:getVal('e_relationships'),
    contact_name:getVal('e_contact_name'),phone:getVal('e_phone'),email:getVal('e_email'),
    last_meeting:getVal('e_last_meeting'),frequency:getVal('e_frequency')};
  if(editingIndex>=0)actors[editingIndex]=actor;else actors.push(actor);
  cancelEdit();renderActors();saveState(true);
  if(currentTab==='matrix')renderMatrix();
}

function deleteActor(i){
  if(_deletePending===i){
    clearTimeout(_deleteTimer);_deletePending=-1;
    actors.splice(i,1);renderActors();saveState(true);
    if(currentTab==='matrix')renderMatrix();
  }else{
    if(_deletePending>=0)resetDeletePending();
    _deletePending=i;
    const btn=document.querySelector('#actor-card-'+i+' .del-btn');
    if(btn){btn.classList.add('delete-pending');btn.title=lang==='fr'?'Cliquer encore pour confirmer':lang==='es'?'Clic de nuevo para confirmar':'Click again to confirm';}
    _deleteTimer=setTimeout(()=>resetDeletePending(),3000);
  }
}

function resetDeletePending(){
  if(_deletePending>=0){
    const btn=document.querySelector('#actor-card-'+_deletePending+' .del-btn');
    if(btn){btn.classList.remove('delete-pending');btn.title=t('btn_delete');}
  }
  _deletePending=-1;_deleteTimer=null;
}

function getVal(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function setVal(id,v){const e=document.getElementById(id);if(e&&v!=null)e.value=v;}
function setSel(id,v){const e=document.getElementById(id);if(e&&v!=null)e.value=v;}

function renderMatrix(){
  const svg=document.getElementById('matrixSvg');
  const note=document.getElementById('matrixNote');
  if(!svg)return;
  const W=680,H=500,ML=80,MB=60,MT=25,MR=25;
  const CW=W-ML-MR,CH=H-MB-MT;
  const midX=ML+CW/2,midY=MT+CH/2;
  const activeActors=actors.filter(a=>!a.status||a.status==='active');
  const plotActors=activeActors.filter(a=>RATING_POS[a.influence]!=null&&RATING_POS[a.acceptance]!=null);
  const excl=activeActors.filter(a=>!RATING_POS[a.influence]||!RATING_POS[a.acceptance]);
  if(note){if(excl.length>0){const exclNames=excl.map(a=>'<strong>'+esc(a.name)+'</strong>').join(', ');note.innerHTML='<span style="color:var(--moderate)">&#9888; '+t('matrix_fluctuant_note').replace(/\.$/,'')+' : '+exclNames+'</span>';}else{note.innerHTML='';}}
  let s='';
  s+=`<rect x="${ML}" y="${MT}" width="${CW/2}" height="${CH/2}" fill="#fef2f2" opacity="0.6"/>`;
  s+=`<rect x="${midX}" y="${MT}" width="${CW/2}" height="${CH/2}" fill="#f0fdf4" opacity="0.6"/>`;
  s+=`<rect x="${ML}" y="${midY}" width="${CW/2}" height="${CH/2}" fill="#f8f8f8" opacity="0.6"/>`;
  s+=`<rect x="${midX}" y="${midY}" width="${CW/2}" height="${CH/2}" fill="#eff6ff" opacity="0.6"/>`;
  s+=`<rect x="${ML}" y="${MT}" width="${CW}" height="${CH}" fill="none" stroke="#d4dcc4" stroke-width="1.5"/>`;
  s+=`<line x1="${midX}" y1="${MT}" x2="${midX}" y2="${MT+CH}" stroke="#bfcbaa" stroke-width="1" stroke-dasharray="4,3"/>`;
  s+=`<line x1="${ML}" y1="${midY}" x2="${ML+CW}" y2="${midY}" stroke="#bfcbaa" stroke-width="1" stroke-dasharray="4,3"/>`;
  const qlSt='font-family:Source Sans 3,sans-serif;font-size:12px;font-weight:700;opacity:0.72;';
  s+=`<text x="${ML+8}" y="${MT+17}" style="${qlSt}" fill="#c0392b">${t('matrix_quadrant_tl')}</text>`;
  s+=`<text x="${midX+8}" y="${MT+17}" style="${qlSt}" fill="#1a6b3a">${t('matrix_quadrant_tr')}</text>`;
  s+=`<text x="${ML+8}" y="${midY+17}" style="${qlSt}" fill="#8a95a3">${t('matrix_quadrant_bl')}</text>`;
  s+=`<text x="${midX+8}" y="${midY+17}" style="${qlSt}" fill="#1d4ed8">${t('matrix_quadrant_br')}</text>`;
  const axSt='font-family:Source Sans 3,sans-serif;font-size:13px;font-weight:700;fill:#2d3748;';
  s+=`<text x="${ML+CW/2}" y="${H-6}" text-anchor="middle" style="${axSt}">${t('matrix_x_label')}</text>`;
  s+=`<text x="14" y="${MT+CH/2}" text-anchor="middle" style="${axSt}" transform="rotate(-90,14,${MT+CH/2})">${t('matrix_y_label')}</text>`;
  const tkSt='font-family:Source Sans 3,sans-serif;font-size:11px;fill:#5a6678;font-weight:500;';
  ['low','medium','high'].forEach((r,ri)=>{
    const xp=ML+[0.22,0.5,0.78][ri]*CW;
    const yp=MT+[0.78,0.5,0.22][ri]*CH;
    s+=`<text x="${xp}" y="${MT+CH+16}" text-anchor="middle" style="${tkSt}">${t('rating_'+r)}</text>`;
    s+=`<text x="${ML-6}" y="${yp+4}" text-anchor="end" style="${tkSt}">${t('rating_'+r)}</text>`;
  });
  if(plotActors.length===0){
    const msg=actors.length===0?t('matrix_empty'):t('matrix_all_excluded');
    s+=`<text x="${ML+CW/2}" y="${MT+CH/2}" text-anchor="middle" style="font-family:Source Sans 3,sans-serif;font-size:13px;fill:#8a95a3;">${msg}</text>`;
    svg.innerHTML=s;return;
  }
  const occupied={};
  plotActors.forEach(a=>{
    const xR=RATING_POS[a.acceptance];
    const yR=1-RATING_POS[a.influence];
    const baseX=ML+xR*CW, baseY=MT+yR*CH;
    const key=Math.round(xR*10)+'_'+Math.round(yR*10);
    occupied[key]=(occupied[key]||0)+1;
    const jit=occupied[key]-1;
    const cx=baseX+(jit%2===0?jit/2*20:-jit/2*20);
    const cy=baseY-Math.floor(jit/2)*22;
    const color=ENG_COLORS[a.engagement]||'#6a8420';
    const idx=actors.indexOf(a);
    const num=idx+1;
    s+=`<g onclick="switchTabAndHighlight(${idx})" style="cursor:pointer">
      <circle cx="${cx}" cy="${cy}" r="19" fill="${color}" opacity="0.9" stroke="#fff" stroke-width="2"/>
      <text x="${cx}" y="${cy+5}" text-anchor="middle" style="font-family:Source Sans 3,sans-serif;font-size:12px;font-weight:700;fill:#fff;pointer-events:none">${num}</text>
      <title>${a.name} | ${t('lbl_influence')}: ${ratingLabel(a.influence)} | ${t('lbl_acceptance')}: ${ratingLabel(a.acceptance)}</title>
    </g>`;
  });
  svg.innerHTML=s;
  const legEl=document.getElementById('matrixActorLegend');
  if(legEl){
    if(plotActors.length>0){
      let lg='<div class="matrix-actor-legend-title">'+t('matrix_actor_legend')+'</div>';
      lg+='<div class="matrix-actor-legend-grid">';
      plotActors.forEach(a=>{
        const idx=actors.indexOf(a);const num=idx+1;
        const color=ENG_COLORS[a.engagement]||'#6a8420';
        lg+=`<div class="matrix-actor-item">`
          +`<span class="matrix-actor-num" style="background:${color}">${num}</span>`
          +`<span class="matrix-actor-name">${esc(a.name)}</span>`
          +`<span class="rating-badge ${ratingClass(a.influence)}" style="font-size:10px">${ratingLabel(a.influence)}</span>`
          +`<span class="rating-badge ${ratingClass(a.acceptance)}" style="font-size:10px">${ratingLabel(a.acceptance)}</span>`
          +'</div>';
      });
      lg+='</div>';
      legEl.innerHTML=lg;
    }else{legEl.innerHTML='';}
  }
}

function switchTabAndHighlight(i){
  switchTab('list');
  setTimeout(()=>{
    const card=document.getElementById('actor-card-'+i);
    if(card){card.scrollIntoView({behavior:'smooth',block:'center'});const body=document.getElementById('actor-body-'+i);if(body)body.classList.add('open');}
  },100);
}

function collectData(){
  return{country:getVal('f_country'),office:getVal('f_office'),sfp:getVal('f_sfp'),
    date:getVal('f_date'),nextReview:getVal('f_next_review'),actors:JSON.parse(JSON.stringify(actors))};
}
function restoreData(d){
  if(!d)return;
  setVal('f_country',d.country);setVal('f_office',d.office||'');setVal('f_sfp',d.sfp||'');
  setVal('f_date',d.date||'');setVal('f_next_review',d.nextReview||'');
  if(Array.isArray(d.actors))actors=d.actors;
  const off=document.getElementById('f_office');
  if(off){const l=document.getElementById('topOfficeLabel');if(l)l.textContent=off.value;}
  checkNextReview();
}

function saveState(isUserAction){
  try{
    const data=Object.assign({savedAt:new Date().toISOString()},collectData());
    localStorage.setItem(LS_KEY,JSON.stringify(data));
    if(isUserAction&&!isInit){
      modCount++;
      const badge=document.getElementById('exportBadge');
      if(badge){badge.style.display='flex';badge.textContent=modCount>9?'9+':modCount;}
      const ind=document.getElementById('saveIndicator');
      if(ind){ind.style.display='block';clearTimeout(ind._t);ind._t=setTimeout(()=>ind.style.display='none',1500);}
    }
  }catch(e){}
}

function resetModCount(){
  modCount=0;
  const badge=document.getElementById('exportBadge');
  if(badge)badge.style.display='none';
}

function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw)return false;
    const d=JSON.parse(raw);
    if(typeof d!=='object'||d===null){localStorage.removeItem(LS_KEY);return false;}
    restoreData(d);return true;
  }catch(e){try{localStorage.removeItem(LS_KEY);}catch(e2){}return false;}
}

function safe(s){return(s||'').replace(/[^a-zA-Z0-9]+/g,'').slice(0,24)||'NA';}
function getExportFilename(ext){
  return [TOOL_PREFIX,safe(getVal('f_country')),safe(getVal('f_office')),safe(getVal('f_sfp')),new Date().toISOString().slice(0,10)].join('_')+'.'+ext;
}
function dlFile(name,content,type){
  try{
    const blob=new Blob([content],{type});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(url);document.body.removeChild(a);},200);
  }catch(e){alert(t('alert_download'));}
}

function exportJSON(){
  const data={metadata:{toolName:TOOL_NAME,toolVersion:TOOL_VERSION_BASE,exportedAt:new Date().toISOString(),jsonVersion:2},_lang:lang,data:collectData()};
  dlFile(getExportFilename('json'),JSON.stringify(data,null,2),'application/json');
  resetModCount();closeExport();
}
function importJSON(){document.getElementById('importInput').click();closeExport();}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const payload=d.data||d;
      restoreData(payload);renderActors();saveState(false);alert(t('alert_saved'));
    }catch(err){alert(t('alert_error')+err.message);}
  };
  reader.readAsText(file);e.target.value='';
}

function exportExcel(){
  const lx=I18N[lang]||I18N.en;
  const ec={develop:'background:#e8f5ed;color:#1a6b3a;',maintain:'background:#eff6ff;color:#1d4ed8;',monitor:'background:#fefce8;color:#92660a;',avoid:'background:#fff4ed;color:#c05c0a;',nocontact:'background:#fdf0ee;color:#c0392b;'};
  let h='<html xmlns:o="urn:schemas-microsoft-com:office:office"><head><meta charset="UTF-8"></head><body>';
  h+=`<table border="1" style="border-collapse:collapse;font-family:Arial;font-size:12px">`;
  h+=`<tr><td colspan="10" style="background:#8FAF2E;color:#fff;font-weight:bold;padding:8px">${lx.panel_title||'Key Actors Mapping'} - ${lx.conf_badge||'CONFIDENTIAL'}</td></tr>`;
  h+=`<tr><td colspan="5" style="padding:4px"><b>${lx.lbl_country}:</b> ${getVal('f_country')}</td><td colspan="5"><b>${lx.lbl_office}:</b> ${getVal('f_office')}</td></tr>`;
  h+=`<tr><td colspan="5" style="padding:4px"><b>${lx.lbl_sfp}:</b> ${getVal('f_sfp')}</td><td colspan="5"><b>${lx.lbl_date}:</b> ${getVal('f_date')}</td></tr>`;
  h+='<tr><td colspan="10"></td></tr>';
  const cols=[lx.lbl_actor_name,lx.lbl_category,lx.lbl_influence,lx.lbl_acceptance,lx.lbl_engagement,lx.lbl_status,lx.lbl_trend,lx.lbl_last_updated_actor,lx.lbl_interests,lx.lbl_acceptance_why,lx.lbl_area,lx.lbl_relationships,lx.lbl_contact_section];
  h+='<tr style="background:#eaede4;font-weight:bold">'+cols.map(c=>`<td style="padding:6px 8px">${c||''}</td>`).join('')+'</tr>';
  actors.forEach(a=>{
    const es=ec[a.engagement]||'';
    const catDisplay=a.category==='other'?(a.category_other||lx.cat_other):lx['cat_'+a.category]||a.category;
    h+=`<tr>
      <td style="padding:6px;font-weight:600">${(a.name||'').replace(/</g,'&lt;')}</td>
      <td style="padding:6px">${catDisplay}</td>
      <td style="padding:6px;font-weight:700">${lx['rating_'+a.influence]||a.influence}</td>
      <td style="padding:6px;font-weight:700">${lx['rating_'+a.acceptance]||a.acceptance}</td>
      <td style="padding:6px;font-weight:700;${es}">${lx['eng_'+a.engagement]||a.engagement}</td>
      <td style="padding:6px">${lx['status_'+a.status]||a.status||'-'}</td>
      <td style="padding:6px">${lx['trend_'+a.trend]||a.trend||'-'}</td>
      <td style="padding:6px">${a.last_updated||'-'}</td>
      <td style="padding:6px;white-space:pre-wrap">${(a.interests||'').replace(/</g,'&lt;')}</td>
      <td style="padding:6px;white-space:pre-wrap">${(a.acceptance_why||'').replace(/</g,'&lt;')}</td>
      <td style="padding:6px">${(a.area||'').replace(/</g,'&lt;')}</td>
      <td style="padding:6px">${(a.relationships||'').replace(/</g,'&lt;')}</td>
      <td style="padding:6px">${[a.contact_name,a.phone,a.email,a.last_meeting,a.frequency].filter(Boolean).join(' | ')}</td>
    </tr>`;
  });
  h+='</table></body></html>';
  dlFile(getExportFilename('xls'),h,'application/vnd.ms-excel');
  closeExport();
}

document.addEventListener('DOMContentLoaded',()=>{
  try{
    isInit=true;
    let saved=null;try{saved=localStorage.getItem(LS_LANG);}catch(e){}
    if(saved&&I18N[saved])lang=saved;
    else{const bl=(navigator.language||'en').slice(0,2).toLowerCase();lang=I18N[bl]?bl:'en';}
    setActiveFlag(lang);document.documentElement.lang=lang;
    const restored=loadState();
    if(!restored||isDefaultExamples(actors)){
      const fd=document.getElementById('f_date');if(fd&&!restored)fd.value=new Date().toISOString().slice(0,10);
      actors=JSON.parse(JSON.stringify(EXAMPLE_ACTORS[lang]||EXAMPLE_ACTORS.en));
    }
    renderActors();applyI18n();
    isInit=false;
    openNotice();
  }catch(e){
    console.error('Init error:',e);
    isInit=false;
    const bar=document.getElementById('emergencyBar');if(bar)bar.classList.add('show');
  }
});
