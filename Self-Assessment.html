    <div class="confirm-msg" id="val-msg"></div>
    <ul id="val-missing" style="margin:0 0 18px 18px;font-size:13px;color:var(--no);line-height:1.8"></ul>
    <div class="confirm-btns" style="justify-content:center">
      <button class="confirm-cancel" style="background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600" onclick="closeValidation()" data-i18n="expValidClose"></button>
    </div>
  </div>
</div>
<input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)">

<!-- Popover état plan d'action -->
<div id="etatPopover">
  <div id="etatPopoverTitle" style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#5a7aaa;margin-bottom:10px"></div>
  <div id="etatPopoverContent"></div>
</div>

<script>
function toggleEtatPopover(event) {
  event.stopPropagation();
  var pop = document.getElementById('etatPopover');
  var btn = event.currentTarget;
  if (pop.classList.contains('visible')) { pop.classList.remove('visible'); return; }
  var titles = { fr:'Signification des statuts', en:'Status meanings', es:'Significado de los estados' };
  var itemsMap = {
    fr:[
      { label:'—',        desc:'Pas encore traité',                        bg:'#f0f3f5', tc:'#5a6b7a' },
      { label:'En cours',   desc:'Action démarrée',                        bg:'#e8f0fb', tc:'#7493C7' },
      { label:'En pause',   desc:"Suspendue, en attente d'une décision",        bg:'#fdf5e8', tc:'#b7600a' },
      { label:'Annulé',    desc:'Plus pertinente, abandonnée',             bg:'#fdf0ee', tc:'#c0392b' },
      { label:'Terminé',   desc:'Réalisée — ligne barrée automatiquement', bg:'#e8f5ed', tc:'#1a6b3a' },
    ],
    en:[
      { label:'—',         desc:'Not yet started',                              bg:'#f0f3f5', tc:'#5a6b7a' },
      { label:'In progress', desc:'Action started',                                 bg:'#e8f0fb', tc:'#7493C7' },
      { label:'On hold',     desc:'Paused, pending decision',                       bg:'#fdf5e8', tc:'#b7600a' },
      { label:'Cancelled',   desc:'No longer relevant, abandoned',                  bg:'#fdf0ee', tc:'#c0392b' },
      { label:'Completed',   desc:'Done — row struck through automatically',   bg:'#e8f5ed', tc:'#1a6b3a' },
    ],
    es:[
      { label:'—',         desc:'Aún no iniciado',                         bg:'#f0f3f5', tc:'#5a6b7a' },
      { label:'En curso',    desc:'Acción iniciada',                            bg:'#e8f0fb', tc:'#7493C7' },
      { label:'En pausa',    desc:'Suspendida, pendiente de decisión',         bg:'#fdf5e8', tc:'#b7600a' },
      { label:'Cancelado',   desc:'Ya no pertinente, abandonada',                   bg:'#fdf0ee', tc:'#c0392b' },
      { label:'Completado',  desc:'Realizada — fila tachada automáticamente', bg:'#e8f5ed', tc:'#1a6b3a' },
    ],
  };
  var l = (typeof currentLang !== 'undefined' ? currentLang : 'fr') || 'fr';
  var items = itemsMap[l] || itemsMap['fr'];
  document.getElementById('etatPopoverTitle').textContent = titles[l] || titles['fr'];
  document.getElementById('etatPopoverContent').innerHTML = items.map(function(it) {
    return '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:7px;font-size:12px;line-height:1.5">' +
      '<span style="background:'+it.bg+';color:'+it.tc+';border-radius:3px;padding:1px 7px;font-weight:700;white-space:nowrap;flex-shrink:0">'+it.label+'</span>' +
      '<span style="color:#4a5568">'+it.desc+'</span></div>';
  }).join('');
  var rect = btn.getBoundingClientRect();
  pop.style.top  = (rect.bottom + 6) + 'px';
  pop.style.left = Math.max(8, rect.left - 260) + 'px';
  pop.classList.add('visible');
}
document.addEventListener('click', function(e) {
  var pop = document.getElementById('etatPopover');
  if (pop && pop.classList.contains('visible') && !pop.contains(e.target)) pop.classList.remove('visible');
});

function toggleSATipDetail() {
  var detail = document.getElementById('saTipDetail');
  var toggle = document.getElementById('saPrioToggle');
  if (!detail) return;
  var isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : 'block';
  if (!isOpen && typeof t === 'function') detail.innerHTML = t('saTipDetail') || '';
  if (toggle) toggle.textContent = isOpen
    ? ((typeof t==='function'&&t('btn_prio_more')) || ' En savoir plus…')
    : ((typeof t==='function'&&t('btn_prio_less')) || 'Réduire ↑');
}

</script>



</body>
</html>
