<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LWF Pre-Departure Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    font-size: 14px;
    color: #333;
    background: #fff;
    padding: 20px 24px 32px;
    max-width: 720px;
    margin: 0 auto;
  }

  .header {
    border-left: 4px solid #7493C7;
    padding: 8px 0 8px 14px;
    margin-bottom: 20px;
  }

  .header h1 {
    font-size: 18px;
    font-weight: bold;
    color: #7493C7;
    margin-bottom: 4px;
  }

  .header p {
    font-size: 12px;
    color: #888;
  }

  .progress-bar-wrap {
    background: #eef2f8;
    border-radius: 6px;
    height: 8px;
    margin-bottom: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: #7493C7;
    border-radius: 6px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 12px;
    color: #7493C7;
    font-weight: bold;
    margin-bottom: 20px;
  }

  .group {
    margin-bottom: 20px;
  }

  .group-title {
    font-size: 13px;
    font-weight: bold;
    color: #7493C7;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding-bottom: 6px;
    border-bottom: 1px solid #dde4f0;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .group-count {
    font-size: 11px;
    color: #aaa;
    font-weight: normal;
    text-transform: none;
    letter-spacing: 0;
    margin-left: auto;
  }

  .item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 8px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
  }

  .item:hover {
    background: #f4f7fc;
  }

  .item.done {
    background: #f0f5ee;
    border-color: #c8dfc4;
  }

  .item input[type="checkbox"] {
    width: 17px;
    height: 17px;
    margin-top: 1px;
    flex-shrink: 0;
    accent-color: #7493C7;
    cursor: pointer;
  }

  .item label {
    cursor: pointer;
    line-height: 1.45;
    color: #333;
    flex: 1;
  }

  .item.done label {
    color: #666;
    text-decoration: line-through;
    text-decoration-color: #aaa;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    background: #eef2f8;
    color: #7493C7;
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 6px;
    font-weight: bold;
    white-space: nowrap;
    vertical-align: middle;
    text-decoration: none;
  }

  .item.done .tag {
    text-decoration: none;
  }

  .footer-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid #eee;
    align-items: center;
  }

  .btn {
    font-size: 12px;
    font-family: Arial, sans-serif;
    padding: 7px 16px;
    border-radius: 5px;
    cursor: pointer;
    border: 1px solid #ccc;
    background: #fff;
    color: #555;
    transition: background 0.15s;
  }

  .btn:hover { background: #f5f5f5; }

  .btn-primary {
    background: #7493C7;
    color: #fff;
    border-color: #7493C7;
  }

  .btn-primary:hover { background: #5d7ab5; }

  .saved-msg {
    font-size: 11px;
    color: #7493C7;
    margin-left: auto;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .saved-msg.show { opacity: 1; }

  @media print {
    .footer-actions { display: none; }
    body { padding: 10px; }
    .item.done label { text-decoration: none; color: #333; }
  }

  .all-done-banner {
    display: none;
    background: #f0f5ee;
    border: 1px solid #c8dfc4;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    color: #3a6b35;
    font-weight: bold;
    margin-bottom: 16px;
    text-align: center;
  }

  .all-done-banner.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>Pre-Departure Checklist</h1>
  <p>LWF Safe Travel — complete before every field trip</p>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="progress-label" id="progressLabel">0 / 20 completed</div>

<div class="all-done-banner" id="allDoneBanner">
  All items checked. You are ready to travel. Safe trip!
</div>

<div id="checklist"></div>

<div class="footer-actions">
  <button class="btn btn-primary" onclick="window.print()">Print</button>
  <button class="btn" onclick="resetAll()">Reset</button>
  <span class="saved-msg" id="savedMsg">Saved</span>
</div>

<script>
const GROUPS = [
  {
    id: "admin",
    title: "Admin & documents",
    items: [
      { id: "a1", text: "Travel Request form completed via SharePoint (line manager approval)", tag: null },
      { id: "a2", text: "Valid passport — 6-month validity confirmed for destination", tag: null },
      { id: "a3", text: "Visa confirmed (including transit and Schengen if applicable)", tag: null },
      { id: "a4", text: "LWF Guarantee Letter — checked if required, paper copy packed", tag: null },
      { id: "a5", text: "LWF ID card — valid and packed", tag: null },
      { id: "a6", text: "Scanned copies of passport + insurance card saved to LWF OneDrive", tag: null },
    ]
  },
  {
    id: "health",
    title: "Health & medical",
    items: [
      { id: "h1", text: "Yellow vaccination booklet checked — yellow fever certificate up to date", tag: null },
      { id: "h2", text: "Personal medicines packed in original packaging, with prescriptions", tag: null },
      { id: "h3", text: "Basic first aid kit packed", tag: null },
      { id: "h4", text: "TSM contact number + policy saved in phone", tag: "+41 (0)22 819 44 66 / Policy 20 01 026" },
      { id: "h5", text: "Spare pair of eyeglasses packed", tag: null },
    ]
  },
  {
    id: "security",
    title: "Security prep",
    items: [
      { id: "s1", text: "Travel advisory checked (GardaWorld or government website)", tag: null },
      { id: "s2", text: "Country Welcome Guide received and read", tag: "WS programs only" },
      { id: "s3", text: "Embassy registration completed for destination country", tag: null },
      { id: "s4", text: "Key contacts saved: local representative, Country SFP, line manager", tag: null },
    ]
  },
  {
    id: "depart",
    title: "Before you leave",
    items: [
      { id: "d1", text: "Local currency and small cash packed (USD/EUR, post-2009 notes)", tag: null },
      { id: "d2", text: "Offline map downloaded for destination (Google Maps offline)", tag: null },
      { id: "d3", text: "Spare clothes, toiletries, and medication in cabin bag", tag: null },
      { id: "d4", text: "Laptop backed up to LWF OneDrive, VPN configured", tag: null },
      { id: "d5", text: "Security briefing scheduled within 48 hours of arrival", tag: null },
    ]
  }
];

const STORAGE_KEY = "lwf_checklist_v1";
let state = {};

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    state = saved ? JSON.parse(saved) : {};
  } catch(e) { state = {}; }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
  const msg = document.getElementById("savedMsg");
  msg.classList.add("show");
  setTimeout(() => msg.classList.remove("show"), 1500);
}

function getTotalItems() {
  return GROUPS.reduce((acc, g) => acc + g.items.length, 0);
}

function getCheckedCount() {
  return Object.values(state).filter(Boolean).length;
}

function updateProgress() {
  const total = getTotalItems();
  const checked = getCheckedCount();
  const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
  document.getElementById("progressBar").style.width = pct + "%";
  document.getElementById("progressLabel").textContent = checked + " / " + total + " completed";
  const banner = document.getElementById("allDoneBanner");
  banner.classList.toggle("show", checked === total);
}

function render() {
  const container = document.getElementById("checklist");
  container.innerHTML = "";

  GROUPS.forEach(group => {
    const groupDiv = document.createElement("div");
    groupDiv.className = "group";

    const checkedInGroup = group.items.filter(i => state[i.id]).length;
    const titleDiv = document.createElement("div");
    titleDiv.className = "group-title";
    titleDiv.innerHTML = group.title + `<span class="group-count">${checkedInGroup}/${group.items.length}</span>`;
    groupDiv.appendChild(titleDiv);

    group.items.forEach(item => {
      const div = document.createElement("div");
      div.className = "item" + (state[item.id] ? " done" : "");
      div.setAttribute("role", "listitem");

      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.id = "cb_" + item.id;
      cb.checked = !!state[item.id];
      cb.setAttribute("aria-label", item.text);

      const label = document.createElement("label");
      label.htmlFor = "cb_" + item.id;
      label.textContent = item.text;

      if (item.tag) {
        const tagSpan = document.createElement("span");
        tagSpan.className = "tag";
        tagSpan.textContent = item.tag;
        label.appendChild(tagSpan);
      }

      cb.addEventListener("change", () => {
        state[item.id] = cb.checked;
        div.classList.toggle("done", cb.checked);
        saveState();
        updateProgress();
        updateGroupCount(groupDiv, group);
      });

      div.appendChild(cb);
      div.appendChild(label);

      div.addEventListener("click", (e) => {
        if (e.target !== cb) cb.click();
      });

      groupDiv.appendChild(div);
    });

    container.appendChild(groupDiv);
  });

  updateProgress();
}

function updateGroupCount(groupDiv, group) {
  const checkedInGroup = group.items.filter(i => state[i.id]).length;
  const countEl = groupDiv.querySelector(".group-count");
  if (countEl) countEl.textContent = checkedInGroup + "/" + group.items.length;
}

function resetAll() {
  if (!confirm("Reset all checkboxes?")) return;
  state = {};
  saveState();
  render();
}

loadState();
render();
</script>
</body>
</html>
